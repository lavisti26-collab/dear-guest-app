[build]
  command = "npm run build"
  publish = "dist"
  base = "."

# React Router SPA: ensure deep links work on Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Dynamic social previews: run edge function on invite paths
[[edge_functions]]
  path = "/invite/*"
  function = "og-meta"

